<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Quản lý đơn hàng - thegioididong.com</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background-color: #f3f3f3;">
    <div class="container py-4">
        <h2 class="mb-4">Danh sách tất cả đơn hàng</h2>
        <div class="bg-white rounded p-4 shadow-sm">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Khách hàng</th>
                        <th>Người đặt</th>
                        <th>Sản phẩm</th>
                        <th>Số lượng</th>
                        <th>Tổng tiền</th>
                        <th>Trạng thái</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td th:text="${order.id}">1</td>
                        <td th:text="${order.customerName}">Nguyễn Văn A</td>
                        <td th:text="${order.user != null ? order.user.username : 'Khách vãng lai'}">admin</td>
                        <td>
                            <div th:each="detail : ${order.orderDetails}" th:text="${detail.product.name}">Sản phẩm</div>
                        </td>
                        <td>
                            <div th:each="detail : ${order.orderDetails}" th:text="${detail.quantity}">1</div>
                        </td>
                        <td class="text-danger fw-bold">
                            <span th:with="total=${#aggregates.sum(order.orderDetails.![product.price * quantity])}" 
                                  th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + '₫'">0₫</span>
                        </td>
                        <td><span class="badge bg-info text-dark">Đang xử lý</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="mt-3">
            <a href="/" class="btn btn-secondary">Quay lại trang chủ</a>
        </div>
    </div>
</body>
</html>
