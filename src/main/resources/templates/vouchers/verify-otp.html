<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Xác thực OTP - thegioididong</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .otp-container {
            max-width: 400px;
            margin: 100px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        .otp-input {
            letter-spacing: 10px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body style="background-color: #f3f3f3;">
    <div class="container">
        <div class="otp-container">
            <h4 class="fw-bold mb-3">Xác thực OTP</h4>
            <p class="text-muted small mb-4">Mã xác thực đã được gửi đến email của bạn. Vui lòng kiểm tra và nhập mã để hoàn tất đổi voucher.</p>
            
            <div th:if="${param.error}" class="alert alert-danger small mb-3">
                Mã OTP không chính xác hoặc đã hết hạn.
            </div>

            <form th:action="@{/vouchers/verify-otp/{id}(id=${voucherId})}" method="post">
                <div class="mb-4">
                    <input type="text" name="otp" class="form-control otp-input" maxlength="6" placeholder="000000" required autofocus>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary fw-bold py-2">XÁC NHẬN</button>
                    <a href="/vouchers/redeem" class="btn btn-link text-decoration-none text-muted small">Hủy bỏ</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
