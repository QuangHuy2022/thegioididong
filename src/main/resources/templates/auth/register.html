<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng ký - thegioididong.com</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 50px auto;
            padding: 30px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .btn-tgdd {
            background-color: #ffd400;
            border: none;
            color: #000;
            font-weight: bold;
            width: 100%;
        }
        .btn-tgdd:hover {
            background-color: #f7c900;
        }
    </style>
</head>
<body style="background-color: #f3f3f3;">
    <div class="container">
        <div class="auth-container">
            <h3 class="text-center mb-4"><i class="fas fa-mobile-alt"></i> thegioididong</h3>
            <h4 class="text-center mb-4">Đăng ký tài khoản</h4>
            
            <form th:action="@{/register}" th:object="${user}" method="post">
                <div class="mb-3">
                    <label class="form-label">Tên đăng nhập</label>
                    <input type="text" th:field="*{username}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" th:field="*{password}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Họ và tên</label>
                    <input type="text" th:field="*{fullName}" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-tgdd py-2">Đăng ký</button>
            </form>
            
            <div class="text-center mt-3">
                <span>Đã có tài khoản? </span><a th:href="@{/login}">Đăng nhập ngay</a>
            </div>
            <div class="text-center mt-2">
                <a href="/">Quay lại trang chủ</a>
            </div>
        </div>
    </div>
</body>
</html>
