<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>403 - Truy cập bị từ chối</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            background-color: #f3f3f3;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-container {
            text-align: center;
            background: #fff;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }
        .error-code {
            font-size: 100px;
            font-weight: bold;
            color: #d0021c;
            margin-bottom: 10px;
            line-height: 1;
        }
        .error-icon {
            font-size: 60px;
            color: #ffc107;
            margin-bottom: 20px;
        }
        .error-message {
            font-size: 20px;
            color: #333;
            margin-bottom: 30px;
        }
        .btn-home {
            background-color: #2f80ed;
            color: #fff;
            font-weight: bold;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .btn-home:hover {
            background-color: #1a6edb;
            color: #fff;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-lock"></i>
        </div>
        <div class="error-code">403</div>
        <h2 class="mb-3">Truy cập bị từ chối!</h2>
        <p class="error-message">Xin lỗi, bạn không có quyền truy cập vào trang này. Chức năng này chỉ dành cho Quản trị viên.</p>
        <a href="/" class="btn btn-home">
            <i class="fas fa-home me-2"></i> Quay lại Trang chủ
        </a>
    </div>
</body>
</html>
