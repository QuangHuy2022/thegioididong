<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Giỏ hàng - thegioididong.com</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .cart-container {
            max-width: 800px;
            margin: 40px auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .cart-item {
            border-bottom: 1px solid #eee;
            padding: 15px 0;
        }
        .cart-item:last-child {
            border-bottom: none;
        }
        .cart-item-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }
        .cart-price {
            color: #d0021c;
            font-weight: bold;
        }
        .btn-order {
            background-color: #fb6e2e;
            color: #fff;
            font-weight: bold;
            width: 100%;
            padding: 15px;
            border-radius: 4px;
            text-transform: uppercase;
            border: none;
        }
    </style>
</head>
<body style="background-color: #f3f3f3;">
    <!-- Header (Simple version) -->
    <div class="tgdd-header">
        <div class="header-container">
            <a href="/" class="logo-wrapper">
                <div class="logo-tgdd">
                    <i class="fas fa-mobile-alt"></i> thegioididong
                </div>
            </a>
            <div class="text-center flex-grow-1">
                <h5 class="m-0">GIỎ HÀNG</h5>
            </div>
            <a href="/" class="text-dark text-decoration-none">Mua thêm sản phẩm khác</a>
        </div>
    </div>

    <div class="container">
        <div class="cart-container">
            <div th:if="${cart == null or cart.isEmpty()}" class="text-center py-5">
                <img src="https://cdn.tgdd.vn/mwgcart/mwgcore/Content/desktop/images/empty-cart.png" style="width: 200px;">
                <p class="mt-3">Không có sản phẩm nào trong giỏ hàng</p>
                <a href="/" class="btn btn-outline-primary mt-3">Về trang chủ</a>
            </div>

            <div th:if="${cart != null and !cart.isEmpty()}">
                <div th:each="item : ${cart}" class="cart-item">
                    <div class="row align-items-center">
                        <div class="col-3 col-md-2">
                            <img th:src="@{/images/{img}(img=${item.product.image})}" class="cart-item-img" th:alt="${item.product.name}">
                        </div>
                        <div class="col-6 col-md-6">
                            <h6 th:text="${item.product.name}">Tên sản phẩm</h6>
                            <div class="cart-price" th:text="${#numbers.formatDecimal(item.product.price, 0, 'COMMA', 0, 'POINT')} + '₫'">0₫</div>
                            <div th:if="${item.product.isPromotion}" class="text-danger small">
                                <i class="fas fa-percent"></i> Sản phẩm khuyến mãi (Còn <span th:text="${item.product.promotionQuantity}">0</span> suất)
                                <div th:if="${item.quantity > item.product.promotionQuantity}" class="text-warning small">
                                    <i class="fas fa-exclamation-triangle"></i> Quá số lượng khuyến mãi, giá sẽ quay về giá gốc: 
                                    <span th:text="${#numbers.formatDecimal(item.product.originalPrice, 0, 'COMMA', 0, 'POINT')} + '₫'">0₫</span>
                                </div>
                            </div>
                        </div>
                        <div class="col-3 col-md-4 text-end">
                            <div class="d-flex align-items-center justify-content-end gap-2">
                                <form th:action="@{/cart/update}" method="post" class="d-flex align-items-center">
                                    <input type="hidden" name="productId" th:value="${item.product.id}">
                                    <input type="number" name="quantity" th:value="${item.quantity}" min="1" class="form-control form-control-sm" style="width: 60px;" onchange="this.form.submit()">
                                </form>
                                <a th:href="@{/cart/remove/{id}(id=${item.product.id})}" class="text-danger"><i class="fas fa-trash"></i></a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-4">
                    <div class="d-flex justify-content-between mb-3">
                        <span class="fw-bold">Tổng tiền:</span>
                        <span class="cart-price fs-4" th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + '₫'">0₫</span>
                    </div>
                    
                    <form th:action="@{/orders/checkout}" method="get">
                        <button type="submit" class="btn-order">ĐẶT HÀNG</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
