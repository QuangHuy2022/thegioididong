<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thêm danh mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow-sm">
        <div class="card-header bg-success text-white py-3">
            <h4 class="mb-0"><i class="fas fa-plus-circle me-2"></i>Thêm danh mục mới</h4>
        </div>
        <div class="card-body p-4">
            <form th:action="@{/categories/add}" th:object="${category}" method="post" enctype="multipart/form-data">

                <div class="mb-3">
                    <label for="name" class="form-label fw-semibold">Tên danh mục:</label>
                    <input type="text" th:field="*{name}" class="form-control" id="name" placeholder="Nhập tên danh mục">
                    <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger mt-1"></div>
                </div>

                <div class="mb-3">
                    <label for="parentCategory" class="form-label fw-semibold">Danh mục cha:</label>
                    <select th:field="*{parentCategory}" class="form-select" id="parentCategory">
                        <option value="">-- Không có (danh mục gốc Lớp 1) --</option>
                        <optgroup label="— Đặt làm lớp 2 (chọn danh mục gốc) —">
                            <option value="Điện thoại">📱 Điện thoại</option>
                            <option value="Laptop">💻 Laptop</option>
                            <option value="Phụ kiện">🎧 Phụ kiện</option>
                            <option value="Smartwatch">⌚ Smartwatch</option>
                            <option value="Đồng hồ">🕐 Đồng hồ</option>
                            <option value="Tablet">📲 Tablet</option>
                            <option value="Máy cũ Thu cũ">♻️ Máy cũ Thu cũ</option>
                            <option value="Màn hình máy in">🖨️ Màn hình máy in</option>
                            <option value="Sim Thẻ Cào">📶 Sim Thẻ Cào</option>
                            <option value="Dịch vụ tiện ích">🛠️ Dịch vụ tiện ích</option>
                        </optgroup>
                        <optgroup label="— Đặt làm lớp 3 (chọn danh mục lớp 2) —">
                            <option th:each="cat : ${allCategories}"
                                    th:if="${cat.parentCategory != null and !cat.parentCategory.isEmpty()}"
                                    th:value="${cat.name}"
                                    th:text="'    └ ' + ${cat.name} + ' (ảnh: ' + (${cat.parentCategory} ?: 'gốc') + ')'">
                            </option>
                        </optgroup>
                    </select>
                    <div class="form-text text-muted">Chọn danh mục cha: Lớc 1 = chọn gốc (Laptop...), Lớp 2 = chọn lớc 1, Lớp 3 = chọn lớp 2.</div>
                </div>

                <div class="mb-3">
                    <label for="imageCategory" class="form-label fw-semibold">Hình ảnh danh mục:</label>
                    <input type="file" name="imageCategory" class="form-control" id="imageCategory" accept="image/*" onchange="previewImage(this)">
                    <div class="mt-2" id="imgPreviewBox" style="display:none;">
                        <p class="text-muted mb-1" style="font-size:13px;">Xem trước:</p>
                        <img id="imgPreview" src="#" style="max-height:80px; border-radius:8px; border:1px solid #ddd; padding:3px;">
                    </div>
                    <div class="form-text text-muted">Upload ảnh PNG/JPG cho biểu tượng danh mục (tùy chọn).</div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-success px-4">
                        <i class="fas fa-save me-1"></i> Lưu
                    </button>
                    <a href="/categories" class="btn btn-secondary px-4">
                        <i class="fas fa-times me-1"></i> Hủy
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function previewImage(input) {
    const box = document.getElementById('imgPreviewBox');
    const preview = document.getElementById('imgPreview');
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => { preview.src = e.target.result; box.style.display = 'block'; };
        reader.readAsDataURL(input.files[0]);
    } else { box.style.display = 'none'; }
}
</script>
</body>
</html>
