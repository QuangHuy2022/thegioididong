<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Cập nhật danh mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow-sm">
            <div class="card-header bg-warning py-3">
                <h4 class="mb-0"><i class="fas fa-edit me-2"></i>Cập nhật danh mục</h4>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/categories/update/{id}(id=${category.id})}" th:object="${category}" method="post"
                    enctype="multipart/form-data">
                    <input type="hidden" th:field="*{id}">
                    <input type="hidden" th:field="*{image}"> <!-- Giữ ảnh cũ nếu không upload mới -->

                    <div class="mb-3">
                        <label for="name" class="form-label fw-semibold">Tên danh mục:</label>
                        <input type="text" th:field="*{name}" class="form-control" id="name"
                            placeholder="Nhập tên danh mục">
                        <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger mt-1"></div>
                    </div>

                    <div class="mb-3">
                        <label for="parentCategory" class="form-label fw-semibold">Danh mục cha:</label>
                        <select th:field="*{parentCategory}" class="form-select" id="parentCategory">
                            <option value="">-- Không có (danh mục gốc Lớp 1) --</option>
                            <optgroup label="— Đặt làm lớp 2 (chọn danh mục gốc) —">
                                <th:block th:each="cat : ${allCategories}">
                                    <option th:if="${cat.parentCategory == null and cat.id != category.id}"
                                        th:value="${cat.id}" th:text="${cat.name}">
                                    </option>
                                </th:block>
                            </optgroup>
                            <optgroup label="— Đặt làm lớp 3 (chọn danh mục lớp 2) —">
                                <th:block th:each="cat : ${allCategories}">
                                    <option th:if="${cat.parentCategory != null and cat.id != category.id}"
                                        th:value="${cat.id}" th:text="'    └ ' + ${cat.name}">
                                    </option>
                                </th:block>
                            </optgroup>
                        </select>
                        <div class="form-text text-muted">Lớp 1 = không chọn, Lớp 2 = chọn gốc, Lớp 3 = chọn lớp 2.
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="imageCategory" class="form-label fw-semibold">Hình ảnh danh mục:</label>

                        <!-- Hiển thị ảnh hiện tại -->
                        <div th:if="${category.image != null}" class="mb-2 d-flex align-items-center gap-3">
                            <img th:src="@{/images/{img}(img=${category.image})}"
                                style="max-height:60px; border-radius:6px; border:1px solid #ddd; padding:3px;"
                                alt="Ảnh hiện tại">
                            <span class="text-muted" style="font-size:13px;">Ảnh hiện tại</span>
                        </div>

                        <input type="file" name="imageCategory" class="form-control" id="imageCategory" accept="image/*"
                            onchange="previewImage(this)">
                        <div class="mt-2" id="imgPreviewBox" style="display:none;">
                            <p class="text-muted mb-1" style="font-size:13px;">Xem trước ảnh mới:</p>
                            <img id="imgPreview" src="#"
                                style="max-height:80px; border-radius:8px; border:1px solid #ddd; padding:3px;">
                        </div>
                        <div class="form-text text-muted">Bỏ trống nếu không muốn thay ảnh.</div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-warning px-4">
                            <i class="fas fa-save me-1"></i> Cập nhật
                        </button>
                        <a href="/categories" class="btn btn-secondary px-4">
                            <i class="fas fa-times me-1"></i> Hủy
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function previewImage(input) {
            const box = document.getElementById('imgPreviewBox');
            const preview = document.getElementById('imgPreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { preview.src = e.target.result; box.style.display = 'block'; };
                reader.readAsDataURL(input.files[0]);
            } else { box.style.display = 'none'; }
        }
    </script>
</body>

</html>
