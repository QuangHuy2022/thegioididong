services:
  db:
    image: postgres:15
    container_name: thegioididong-db
    restart: always
    environment:
      POSTGRES_DB: thegioididong
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d thegioididong"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - thegioididong-network

  app:
    build: .
    image: quanghuy1195/thegioididong:v3
    container_name: thegioididong-app
    restart: on-failure
    ports:
      - "3000:3000"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/thegioididong
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=123456
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      db:
        condition: service_healthy
    networks:
      - thegioididong-network

volumes:
  postgres_data:

networks:
  thegioididong-network:
    driver: bridge
